# El projectKey debe ser EXACTAMENTE este o el proyecto no aparece listado en SonarQube
sonar.projectKey=Sebastian_Hernandez_t1
sonar.projectName=Sebastian_Hernandez_t1

sonar.sources=.
# Excluye entorno, ejemplos del curso, documentación y archivos con credenciales
# (los .env y .md contienen secretos/datos de ejemplo que no son código a evaluar).
sonar.exclusions=.venv/**, **/tests/**, utils/**, **/.env*, **/*.md
sonar.host.url=https://sonarqube.ingsoftware.lat/
# El token NO se versiona. Expórtalo antes de correr el scanner:
#   export SONAR_TOKEN=sqa_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
# sonar-scanner lee la variable de entorno SONAR_TOKEN automáticamente.

# Pruebas y cobertura
sonar.tests=tests
sonar.test.inclusions=**/tests/**, **test_*.py
sonar.python.coverage.reportPaths=coverage.xml
# Los entrypoints (main.py) arrancan procesos y conexiones reales: no se cubren
# con pruebas unitarias, así que se excluyen de la métrica de cobertura.
sonar.coverage.exclusions=**/main.py
# Versión de Python para un análisis más preciso.
sonar.python.version=3.14
